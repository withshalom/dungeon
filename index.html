<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dungeon Seekers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root { --gold:#c8860a; --gold-glow:#c8860a66; }
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; color:#ccc; font-family:'VT323',monospace; }

/* CRT scanline overlay */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);
}

.screen { display:none; width:100%; height:100%; position:absolute; top:0; left:0; flex-direction:column; align-items:center; justify-content:center; }
.screen.active { display:flex; }

/* ── TITLE ── */
#screen-title { background:#000; overflow:hidden; }
.stars { position:absolute; inset:0; pointer-events:none; }
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,3s) infinite alternate; }
@keyframes twinkle { from{opacity:var(--a1,.1)} to{opacity:var(--a2,.5)} }
.title-inner { position:relative; z-index:1; text-align:center; padding:0 24px; }
.title-eyebrow { font-size:11px; color:#333; letter-spacing:6px; margin-bottom:12px; }
.title-main { font-size:clamp(56px,18vw,110px); color:var(--gold); text-shadow:0 0 40px var(--gold),0 0 80px #c8860b33; letter-spacing:4px; line-height:.9; }
.title-sub { font-size:12px; color:#2a1a00; letter-spacing:5px; margin:12px 0 44px; }
.title-icons { display:flex; gap:24px; justify-content:center; margin-bottom:44px; font-size:42px; }
.title-icon { filter:drop-shadow(0 0 12px #c8860b88); animation:iconPop .7s ease var(--dl,.5s) both; }
@keyframes iconPop { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.press-start { font-size:26px; color:var(--gold); letter-spacing:4px; cursor:pointer; animation:blink .9s step-end infinite; text-shadow:0 0 14px var(--gold); border:none; background:none; font-family:'VT323',monospace; padding:0; }
@keyframes blink { 50%{opacity:0} }
.title-hint { margin-top:14px; font-size:12px; color:#222; letter-spacing:3px; cursor:pointer; }

/* ── SELECT ── */
#screen-select { background:#000; justify-content:flex-start; overflow:hidden; }
.select-head { text-align:center; padding:20px 16px 10px; flex-shrink:0; width:100%; }
.select-eye { font-size:11px; color:#333; letter-spacing:5px; margin-bottom:4px; }
.select-ttl { font-size:clamp(24px,7vw,44px); color:var(--gold); text-shadow:0 0 18px var(--gold-glow); letter-spacing:3px; }
.select-foot { font-size:10px; color:#222; letter-spacing:3px; padding:10px; flex-shrink:0; }
.cards-wrap { flex:1; overflow-y:auto; width:100%; max-width:560px; padding:12px 16px; display:flex; flex-direction:column; gap:16px; -webkit-overflow-scrolling:touch; }
.cards-wrap::-webkit-scrollbar { width:3px; }
.cards-wrap::-webkit-scrollbar-thumb { background:#222; }

/* CARD */
.card { border-radius:8px; overflow:hidden; flex-shrink:0; cursor:pointer; border:2px solid var(--cc,#333); transition:border-color .3s,box-shadow .3s; box-shadow:0 0 16px var(--cg,#33333322); }
.card-front { display:flex; height:180px; background:#080808; }
.card-art { width:140px; flex-shrink:0; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.card-art-bg { position:absolute; inset:0; }
.card-art svg { position:relative; z-index:1; filter:drop-shadow(0 4px 18px rgba(0,0,0,.85)); }
.card-body { flex:1; padding:14px 14px 10px; display:flex; flex-direction:column; justify-content:space-between; border-left:1px solid rgba(255,255,255,.04); }
.card-badge { font-size:9px; letter-spacing:3px; padding:2px 8px; display:inline-block; margin-bottom:6px; border:1px solid; }
.card-name { font-size:32px; line-height:1; letter-spacing:2px; }
.card-cls { font-size:12px; color:#444; letter-spacing:2px; margin:2px 0 8px; }
.card-lore { font-size:11px; color:#666; font-family:'IM Fell English',serif; font-style:italic; line-height:1.5; flex:1; }
.card-pills { display:flex; gap:5px; margin-top:8px; flex-wrap:wrap; }
.card-pill { font-size:9px; letter-spacing:1px; padding:2px 7px; border-radius:2px; border:1px solid; }
.card-hint { font-size:9px; color:#222; letter-spacing:2px; text-align:right; margin-top:6px; }

/* CARD EXPANDED BACK */
.card-back { display:none; background:#060608; flex-direction:column; }
.card.flipped .card-front { display:none; }
.card.flipped .card-back { display:flex; }
.card.flipped { height:auto; }
.cb-head { display:flex; align-items:center; gap:10px; padding:12px 14px 8px; border-bottom:1px solid rgba(255,255,255,.05); }
.cb-symbol { font-size:26px; }
.cb-name { font-size:24px; letter-spacing:2px; line-height:1; flex:1; }
.cb-flip { font-size:11px; color:#333; letter-spacing:1px; cursor:pointer; padding:4px 8px; border:1px solid #222; background:none; font-family:'VT323',monospace; }
.cb-body { padding:12px 14px; display:flex; flex-direction:column; gap:12px; }
.cb-lore { font-family:'IM Fell English',serif; font-style:italic; font-size:12px; color:#777; line-height:1.6; padding-bottom:10px; border-bottom:1px solid #0e0e0e; }
.sub-tabs { display:flex; gap:5px; }
.sub-tab { flex:1; padding:7px 5px; background:#0a0a0a; border:1px solid #1a1a1a; cursor:pointer; text-align:center; font-family:'VT323',monospace; border-radius:3px; transition:all .2s; }
.sub-tab.on { border-color:var(--tc,#888); background:rgba(136,136,136,.1); box-shadow:0 0 8px rgba(136,136,136,.3); }
.sub-tab-icon { font-size:18px; }
.sub-tab-name { font-size:12px; letter-spacing:1px; }
.sub-detail { background:#0a0a0c; border:1px solid #141414; padding:10px; border-radius:3px; }
.sub-desc { font-size:11px; color:#777; font-family:'IM Fell English',serif; font-style:italic; line-height:1.6; margin-bottom:8px; }
.sub-traits { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px; }
.sub-trait { font-size:9px; padding:2px 6px; letter-spacing:1px; border:1px solid #2a2a2a; color:#555; }
.stat-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; }
.stat-lbl { font-size:10px; color:#444; width:28px; flex-shrink:0; }
.stat-bar { flex:1; height:4px; background:#111; border:1px solid #1e1e1e; overflow:hidden; border-radius:1px; }
.stat-fill { height:100%; border-radius:1px; transition:width .5s ease; }
.stat-val { font-size:10px; width:18px; text-align:right; flex-shrink:0; }
.confirm-btn { width:100%; padding:13px; font-family:'VT323',monospace; font-size:20px; letter-spacing:4px; border:2px solid; cursor:pointer; transition:all .25s; border-radius:3px; margin-top:2px; }

/* ── INTRO ── */
#screen-intro { overflow:hidden; }
.intro-bg { position:absolute; inset:0; transition:background .8s; }
.intro-vig { position:absolute; inset:0; background:radial-gradient(ellipse at center,transparent 20%,#000d 100%); pointer-events:none; }
.intro-wm { position:absolute; right:5%; top:50%; transform:translateY(-50%); font-size:140px; opacity:.04; pointer-events:none; }
.intro-inner { position:relative; z-index:1; width:100%; max-width:560px; padding:0 28px; }
.intro-hdr { margin-bottom:32px; padding-left:16px; border-left:3px solid #888; }
.intro-ch { font-size:10px; letter-spacing:5px; margin-bottom:4px; }
.intro-nm { font-size:40px; letter-spacing:3px; line-height:1; }
.intro-race-lbl { font-size:13px; color:#444; letter-spacing:3px; }
.intro-lines { min-height:180px; }
.intro-line { font-size:18px; color:#bbb; line-height:1.9; font-family:'IM Fell English',serif; font-style:italic; }
.intro-cursor { display:inline-block; width:9px; animation:blink .5s step-end infinite; }
.intro-continue { margin-top:32px; display:inline-block; cursor:pointer; }
.intro-continue-inner { padding:10px 24px; font-size:18px; letter-spacing:3px; border:2px solid #666; }
.intro-dots { display:flex; gap:7px; margin-top:24px; }
.intro-dot { height:5px; background:#1a1a1a; border-radius:1px; transition:all .3s; }

/* ── CONVERGENCE ── */
#screen-convergence { background:#000; overflow:hidden; }
.conv-bg-el { position:absolute; inset:0; background:radial-gradient(ellipse at center,#1a0a00,#000 70%); }
.conv-inner { position:relative; z-index:1; text-align:center; max-width:420px; padding:0 24px; }
.conv-ln { opacity:0; transform:translateY(8px); animation:fadeUp .6s ease forwards; }
.conv-ln.big { font-size:28px; color:var(--gold); letter-spacing:4px; text-shadow:0 0 14px var(--gold-glow); line-height:2; }
.conv-ln.sm { font-size:17px; color:#888; font-family:'IM Fell English',serif; font-style:italic; line-height:2; }
.conv-party { display:flex; gap:16px; justify-content:center; margin:24px 0; font-size:30px; opacity:0; animation:fadeUp 1s ease .5s forwards; }
.conv-begin { opacity:0; animation:fadeUp .8s ease .8s forwards; }
.conv-sub { margin-top:12px; font-size:12px; color:#333; font-family:'IM Fell English',serif; font-style:italic; opacity:0; animation:fadeUp .8s ease 1s forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* ── GAME ── */
#screen-game { background:#000; }
#game-canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }

/* HUD — portrait optimized */
#hud { position:fixed; top:0; left:0; right:0; display:none; z-index:50; pointer-events:none; }
#hud.on { display:block; }
.hud-bar { display:flex; justify-content:space-between; align-items:flex-start; padding:8px 12px; background:linear-gradient(#000a,transparent); }
.hud-left { background:rgba(0,0,0,.8); border:1px solid #2a2a2a; padding:6px 10px; border-radius:3px; }
.hud-sub { font-size:9px; color:#444; letter-spacing:2px; }
.hud-name { font-size:17px; letter-spacing:2px; line-height:1; }
.hud-hearts { font-size:18px; letter-spacing:1px; margin-top:2px; }
.hud-mm { background:rgba(0,0,0,.8); border:1px solid #2a2a2a; padding:4px; border-radius:3px; }
#minimap { display:block; image-rendering:pixelated; }

#room-lbl { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); font-size:15px; color:#666; letter-spacing:3px; pointer-events:none; z-index:50; opacity:0; transition:opacity .5s; white-space:nowrap; text-shadow:0 0 8px #000; }
#room-lbl.on { opacity:1; }
#fade-overlay { position:fixed; inset:0; background:#000; opacity:0; pointer-events:none; z-index:80; transition:opacity .22s; }
#fade-overlay.on { opacity:1; }

/* MOBILE CONTROLS — portrait bottom */
/* ── MOBILE CONTROLS ── */
#mctl {
  position:fixed; display:none; pointer-events:none; z-index:60;
  opacity:0; transition:opacity .6s;
  /* full screen layer — dpad and buttons positioned inside */
  inset:0;
}
#mctl.show { opacity:1; }
@media(max-width:900px),(pointer:coarse) { #mctl { display:block; } }

/* D-PAD — draggable, starts bottom-left */
#dpad-wrap {
  position:absolute;
  bottom:32px; left:16px;
  pointer-events:all;
  touch-action:none;
  cursor:grab;
}
#dpad-wrap.dragging { cursor:grabbing; }
.dpad {
  display:grid;
  grid-template-columns:repeat(3,64px);
  grid-template-rows:repeat(3,64px);
  gap:5px;
}
.dp {
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.18);
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:rgba(255,255,255,.65);
  touch-action:none; -webkit-user-select:none; user-select:none;
  backdrop-filter:blur(2px);
  transition:background .1s, transform .1s;
}
.dp:active, .dp.pr {
  background:rgba(255,255,255,.22);
  transform:scale(.94);
}
.dp-c {
  background:transparent!important;
  border-color:transparent!important;
  /* Center cell — long-press to drag */
  position:relative;
}
.dp-c::after {
  content:'⠿';
  font-size:14px;
  color:rgba(255,255,255,.15);
  position:absolute;
}

/* ACTION BUTTONS — bottom-right */
#abtn-wrap {
  position:absolute;
  bottom:32px; right:16px;
  display:flex; flex-direction:column;
  align-items:flex-end; gap:12px;
  pointer-events:all;
}
.abtn {
  width:70px; height:70px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.22);
  background:rgba(0,0,0,.35);
  color:rgba(255,255,255,.8);
  font-family:'VT323',monospace; font-size:15px; letter-spacing:1px;
  touch-action:none; -webkit-user-select:none; user-select:none;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:1px;
  backdrop-filter:blur(3px);
  transition:background .1s, transform .1s;
}
.abtn:active { transform:scale(.92); }
.abtn-a {
  border-color:rgba(192,57,43,.55);
  background:rgba(192,57,43,.2);
  width:76px; height:76px;
}
.abtn-s {
  border-color:rgba(155,89,182,.55);
  background:rgba(155,89,182,.2);
}
.abtn-t {
  border-color:rgba(100,180,255,.45);
  background:rgba(100,180,255,.15);
  width:58px; height:58px;
  font-size:12px;
}
.abtn-icon { font-size:22px; line-height:1; }
.abtn-lbl { font-size:11px; opacity:.7; letter-spacing:1px; }

/* PAUSE */
#pause { position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:100; display:none; align-items:center; justify-content:center; flex-direction:column; gap:18px; }
#pause.on { display:flex; }
.pause-ttl { font-size:46px; color:var(--gold); letter-spacing:6px; text-shadow:0 0 20px var(--gold); }
.pause-btn { font-size:20px; color:#666; letter-spacing:3px; cursor:pointer; border:1px solid #2a2a2a; padding:8px 22px; background:none; font-family:'VT323',monospace; border-radius:2px; }
.pause-btn:hover { color:var(--gold); border-color:var(--gold); }

/* ── DIALOGUE SYSTEM ── */
#dialogue-box {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  display:none; flex-direction:column;
  background:linear-gradient(transparent,rgba(0,0,0,.95) 18px);
  padding:0;
}
#dialogue-box.on { display:flex; }
.dlg-portrait-row {
  display:flex; align-items:flex-end; gap:0; padding:0 12px 0;
}
.dlg-portrait {
  width:72px; height:72px; border-radius:6px 6px 0 0;
  border:2px solid var(--dclr,#888); border-bottom:none;
  background:#0a0a0a; display:flex; align-items:center;
  justify-content:center; font-size:36px; flex-shrink:0;
  box-shadow:0 0 14px var(--dclr,#88888844);
}
.dlg-name-tab {
  font-family:'VT323',monospace; font-size:13px;
  color:var(--dclr,#888); letter-spacing:3px;
  padding:3px 10px; background:rgba(0,0,0,.9);
  border:1px solid var(--dclr,#888); border-bottom:none;
  margin-left:-1px; border-radius:4px 4px 0 0; align-self:flex-end;
}
.dlg-panel {
  background:rgba(0,0,0,.96); border-top:2px solid var(--dclr,#888);
  padding:14px 16px 10px; box-shadow:0 0 20px var(--dclr,#88888833);
}
.dlg-text {
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:15px; color:#bbb; line-height:1.7; min-height:44px;
  margin-bottom:12px;
}
.dlg-choices { display:flex; flex-direction:column; gap:6px; }
.dlg-choice {
  font-family:'VT323',monospace; font-size:16px;
  color:#555; letter-spacing:1px; cursor:pointer;
  padding:6px 10px; border:1px solid #1a1a1a;
  border-radius:3px; transition:all .18s; background:rgba(255,255,255,.02);
  text-align:left; line-height:1.3;
}
.dlg-choice:hover, .dlg-choice.sel {
  color:var(--dclr,#888); border-color:var(--dclr,#888);
  background:rgba(255,255,255,.05);
}
.dlg-sub {
  display:block; margin-top:6px;
  font-size:12px; color:#444; font-style:normal;
  font-family:'VT323',monospace; letter-spacing:1px; line-height:1.4;
}
.dlg-choice.investigate { color:#3a5a4a; border-color:#1a2a22; }
.dlg-choice.goto-choice { color:#666; border-color:#1e1e1e; }
.dlg-close {
  font-family:'VT323',monospace; font-size:12px; color:#333;
  letter-spacing:2px; text-align:right; margin-top:8px; cursor:pointer;
}
/* Approval flash indicator */
#approval-flash {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:'VT323',monospace; font-size:22px; letter-spacing:3px;
  pointer-events:none; z-index:300; opacity:0;
  transition:opacity .3s; text-shadow:0 0 12px currentColor;
}
#approval-flash.show { opacity:1; }
/* Interact prompt */
#interact-prompt {
  position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
  font-family:'VT323',monospace; font-size:13px; color:#444;
  letter-spacing:3px; pointer-events:none; z-index:60;
  opacity:0; transition:opacity .3s; white-space:nowrap;
  background:rgba(0,0,0,.7); padding:4px 12px; border-radius:2px;
}
#interact-prompt.on { opacity:1; }


/* ── SHOP SYSTEM ── */
#shop-overlay {
  position:fixed; inset:0; z-index:250; display:none;
  background:rgba(0,0,0,.92); align-items:center; justify-content:center;
  flex-direction:column;
}
#shop-overlay.on { display:flex; }
.shop-window {
  width:min(94vw,480px); max-height:88vh; overflow-y:auto;
  background:#080808; border:2px solid var(--sclr,#888);
  box-shadow:0 0 30px var(--sclr,#88888844);
  display:flex; flex-direction:column;
}
.shop-window::-webkit-scrollbar { width:3px; }
.shop-window::-webkit-scrollbar-thumb { background:#222; }
.shop-header {
  padding:14px 16px 10px; border-bottom:1px solid rgba(255,255,255,.06);
  background:linear-gradient(90deg,var(--sclr,#888)0e,transparent);
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.shop-icon { font-size:30px; }
.shop-title { font-size:22px; letter-spacing:3px; color:var(--sclr,#888); flex:1; }
.shop-subtitle { font-size:11px; color:#333; letter-spacing:2px; }
.shop-gold {
  font-size:18px; color:#f1c40f; letter-spacing:2px;
  text-shadow:0 0 8px #f1c40f88;
}
.shop-close {
  font-size:13px; color:#333; letter-spacing:2px; cursor:pointer;
  padding:4px 10px; border:1px solid #222; font-family:'VT323',monospace; background:none;
}
.shop-npc-line {
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:13px; color:#555; padding:10px 16px 0; line-height:1.5;
}
.shop-section-lbl {
  font-size:11px; color:#2a2a2a; letter-spacing:4px;
  padding:10px 16px 4px; border-top:1px solid #0e0e0e; margin-top:4px;
}
.shop-items { padding:8px 12px 14px; display:flex; flex-direction:column; gap:8px; }
.shop-item {
  border:1px solid #1a1a1a; padding:10px 12px;
  display:flex; align-items:center; gap:10px;
  border-radius:3px; background:rgba(255,255,255,.02);
  transition:border-color .2s, background .2s;
}
.shop-item.affordable:hover { border-color:var(--sclr,#888); background:rgba(255,255,255,.04); }
.shop-item.owned { border-color:#2a4a1a; background:rgba(40,80,20,.08); }
.shop-item.cantafford { opacity:.4; }
.shop-item-icon { font-size:24px; flex-shrink:0; }
.shop-item-info { flex:1; }
.shop-item-name { font-size:17px; letter-spacing:1px; line-height:1; }
.shop-item-desc { font-size:11px; color:#444; font-family:'IM Fell English',serif; font-style:italic; margin-top:2px; }
.shop-item-stat { font-size:11px; color:#666; margin-top:3px; letter-spacing:1px; }
.shop-item-right { text-align:right; flex-shrink:0; }
.shop-item-price { font-size:18px; color:#f1c40f; letter-spacing:1px; }
.shop-item-price.owned-lbl { color:#4a8a2a; font-size:14px; }
.shop-buy-btn {
  margin-top:4px; padding:3px 10px; font-family:'VT323',monospace;
  font-size:14px; letter-spacing:2px; border:1px solid #333;
  background:none; color:#555; cursor:pointer; border-radius:2px;
}
.shop-buy-btn:hover { border-color:var(--sclr,#888); color:var(--sclr,#888); }
.shop-buy-btn:disabled { opacity:.3; cursor:default; }
/* HUD gold display */
.hud-gold { font-size:14px; color:#f1c40f; letter-spacing:1px; margin-top:3px; text-shadow:0 0 6px #f1c40f66; }
/* Purchase flash */
#buy-flash {
  position:fixed; top:40%; left:50%; transform:translate(-50%,-50%);
  font-family:'VT323',monospace; font-size:20px; letter-spacing:3px;
  color:#f1c40f; text-shadow:0 0 12px #f1c40f; pointer-events:none;
  z-index:400; opacity:0; transition:opacity .3s;
}
#buy-flash.show { opacity:1; }

</style>
</head>
<body>

<!-- TITLE -->
<div id="screen-title" class="screen active">
  <div class="stars" id="stars"></div>
  <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:500px;height:160px;background:radial-gradient(ellipse,#c8860b1a,transparent 70%);pointer-events:none"></div>
  <div class="title-inner" style="opacity:0;transform:translateY(28px);animation:iconPop 1.1s ease .2s forwards">
    <div class="title-eyebrow">✦ AN ORIGINAL ADVENTURE ✦</div>
    <div class="title-main">DUNGEON<br>SEEKERS</div>
    <div class="title-sub">── CHRONICLES OF THE SHATTERED KEEP ──</div>
    <div class="title-icons">
      <span class="title-icon" style="--dl:.4s">⚒️</span>
      <span class="title-icon" style="--dl:.55s">🏹</span>
      <span class="title-icon" style="--dl:.7s">🎵</span>
      <span class="title-icon" style="--dl:.85s">🔮</span>
    </div>
    <button class="press-start" onclick="showScreen('select')">▶ PRESS START ◀</button>
    <div class="title-hint" onclick="showScreen('select')">[ CHOOSE YOUR HERO ]</div>
  </div>
</div>

<!-- SELECT -->
<div id="screen-select" class="screen">
  <div class="select-head">
    <div class="select-eye">CHOOSE YOUR HERO</div>
    <div class="select-ttl">DUNGEON SEEKERS</div>
  </div>
  <div class="cards-wrap" id="cards-wrap"></div>
  <div class="select-foot">TAP TO FLIP · PICK SUBCLASS · CONFIRM</div>
</div>

<!-- INTRO -->
<div id="screen-intro" class="screen" ontouchstart="introTap(event)" onclick="introTap(event)">
  <div class="intro-bg" id="intro-bg"></div>
  <div class="intro-vig"></div>
  <div class="intro-wm" id="intro-wm"></div>
  <div class="intro-inner">
    <div class="intro-hdr" id="intro-hdr">
      <div class="intro-ch" id="intro-ch"></div>
      <div class="intro-nm" id="intro-nm">—</div>
      <div class="intro-race-lbl" id="intro-race"></div>
    </div>
    <div class="intro-lines" id="intro-lines"></div>
    <div id="intro-cont" style="display:none">
      <div class="intro-continue" id="intro-cont-btn" onclick="nextIntro()">
        <div class="intro-continue-inner" id="intro-cont-txt">▶ CONTINUE ◀</div>
      </div>
    </div>
  </div>
</div>

<!-- CONVERGENCE -->
<div id="screen-convergence" class="screen" onclick="convTap()" ontouchstart="convTap()">
  <div class="conv-bg-el"></div>
  <div class="conv-inner" id="conv-inner"></div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <canvas id="game-canvas"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-bar">
    <div class="hud-left">
      <div class="hud-sub" id="hud-sub"></div>
      <div class="hud-name" id="hud-name"></div>
      <div class="hud-hearts" id="hud-hearts"></div>
    <div class="hud-gold" id="hud-gold">🪙 0</div>
    </div>
    <div class="hud-mm">
      <canvas id="minimap" width="88" height="88"></canvas>
    </div>
  </div>
</div>
<div id="room-lbl"></div>
<div id="fade-overlay"></div>

<!-- MOBILE CONTROLS -->
<div id="mctl">
  <!-- D-PAD (draggable) -->
  <div id="dpad-wrap">
    <div class="dpad">
      <div class="dp dp-c"></div>
      <div class="dp" id="dp-u" ontouchstart="mD('up')" ontouchend="mU('up')">▲</div>
      <div class="dp dp-c"></div>
      <div class="dp" id="dp-l" ontouchstart="mD('left')" ontouchend="mU('left')">◀</div>
      <div class="dp dp-c" id="dpad-drag-handle" title="Drag with 2nd finger · Double-tap to reset"></div>
      <div class="dp" id="dp-r" ontouchstart="mD('right')" ontouchend="mU('right')">▶</div>
      <div class="dp dp-c"></div>
      <div class="dp" id="dp-d" ontouchstart="mD('down')" ontouchend="mU('down')">▼</div>
      <div class="dp dp-c"></div>
    </div>
  </div>
  <!-- ACTION BUTTONS -->
  <div id="abtn-wrap">
    <button class="abtn abtn-t" ontouchstart="if(nearNPC&&!dlgOpen)openDlg(nearNPC.id);else if(window._nearShop&&!activeShop)openShop(window._nearShop)">
      <span class="abtn-icon">💬</span><span class="abtn-lbl">TALK</span>
    </button>
    <button class="abtn abtn-s" ontouchstart="mA('skill')">
      <span class="abtn-icon">✦</span><span class="abtn-lbl">SKILL</span>
    </button>
    <button class="abtn abtn-a" ontouchstart="mA('atk')">
      <span class="abtn-icon">⚔</span><span class="abtn-lbl">ATK</span>
    </button>
  </div>
</div>

<!-- PAUSE --><!-- PAUSE -->
<div id="pause">
  <div class="pause-ttl">PAUSED</div>
  <button class="pause-btn" onclick="togglePause()">▶ RESUME</button>
  <button class="pause-btn" onclick="goTitle()">⌂ TITLE</button>
</div>

function selSubClass(charId,subId){

function confirmHero(charId){

  const sub=char.subclasses.find(s=>s.id===selSubId[charId])||char.subclasses[0];

function introTap(e){
  if(!introIntro) return;

  const _tl = introIntro.lines[introLi] || '';

  if(introCi < _tl.length){
    // Line still typing — complete it instantly
    clearTimeout(introTimer);
    introCurText = _tl;
    introCi = _tl.length;
    const linesEl = document.getElementById('intro-lines');
    let tel = document.getElementById('typing-ln');
    if(!tel){ tel=document.createElement('div'); tel.id='typing-ln'; tel.className='intro-line'; linesEl.appendChild(tel); }
    tel.innerHTML = introCurText;
    tel.id = '';
    introCurText = ''; introCi = 0; introLi++;
    introTimer = setTimeout(typeChar, 180);

  } else if(introLi < introIntro.lines.length){
    // Between lines — skip to end of all lines
    clearTimeout(introTimer);
    const linesEl = document.getElementById('intro-lines');
    linesEl.innerHTML = '';
    introIntro.lines.forEach(line=>{
      const d = document.createElement('div');
      d.className = 'intro-line';
      d.textContent = line;
      linesEl.appendChild(d);
    });
    introLi = introIntro.lines.length;
    introCi = 0; introCurText = '';
    // Show continue prompt
    document.getElementById('intro-cont-txt').textContent = introSingle ? '▶ ENTER THE KEEP ◀' : '▶ CONTINUE ◀';
    document.getElementById('intro-cont').style.display = 'block';

  } else {
    // All lines shown — any tap exits
    nextIntro();
  }
}

function typeChar(){
  const intro=introIntro;
  if(introLi>=intro.lines.length){
    document.getElementById('intro-cont-txt').textContent=introSingle?'▶ ENTER THE KEEP ◀':'▶ CONTINUE ◀';
    document.getElementById('intro-cont').style.display='block';
    return;
  }
  const line=intro.lines[introLi];
  const linesEl=document.getElementById('intro-lines');
  if(introCi<line.length){
    introCurText+=line[introCi++];
    let tel=document.getElementById('typing-ln');
    if(!tel){ tel=document.createElement('div'); tel.id='typing-ln'; tel.className='intro-line'; linesEl.appendChild(tel); }
    tel.innerHTML=introCurText+`<span class="intro-cursor" style="color:${intro.color}">█</span>`;
    introTimer=setTimeout(typeChar,34);
  } else {
    const tel=document.getElementById('typing-ln');
    if(tel){ tel.id=''; tel.innerHTML=introCurText; }
    introCurText=''; introCi=0; introLi++;
    introTimer=setTimeout(typeChar,280);
  }
}

// GAME ENGINE
// ─────────────────────────────────────────────
const TS=64; // tile size — big, SNES quality
const COLS=19, ROWS=25; // portrait: taller than wide

// World map — open world pub town feel
// Tile types: 0=grass, 1=stone_floor, 2=wall, 3=water, 4=tree,
//             5=door, 6=chest, 7=table, 8=road, 9=stair
// World is one open scrolling map — camera follows player

function mkWorld(){
  const W=COLS, H=ROWS;
  const g=[];
  for(let r=0;r<H;r++){ g.push([]); for(let c=0;c<W;c++) g[r].push(0); }

  // Road running vertically through center
  for(let r=0;r<H;r++){ g[r][8]=8; g[r][9]=8; g[r][10]=8; }
  // Road running horizontally at row 12
  for(let c=0;c<W;c++){ g[12][c]=8; }

  // THE INN — center of map, stone building
  // Inn floor
  for(let r=5;r<=10;r++) for(let c=3;c<=7;c++) g[r][c]=1;
  // Inn walls (overwrite edges)
  for(let c=3;c<=7;c++){ g[5][c]=2; g[10][c]=2; }
  for(let r=5;r<=10;r++){ g[r][3]=2; g[r][7]=2; }
  // Inn door
  g[10][5]=5;
  // Inn tables (inside)
  g[7][4]=7; g[7][6]=7;
  g[8][5]=7;

  // Chest inside inn
  g[6][4]=6; g[6][6]=6;

  // Trees scattered on grass
  const treePts=[[2,2],[3,14],[1,16],[14,2],[15,1],[15,14],[16,16],[0,6],[18,6],[4,20],[14,20],[2,22],[16,22]];
  treePts.forEach(([r,c])=>{ if(r<H&&c<W) g[r][c]=4; });

  // Water pond top-right
  for(let r=2;r<=5;r++) for(let c=13;c<=17;c++) g[r][c]=3;

  // Stone path from inn to road
  g[11][5]=8; g[11][6]=8;

  // Dungeon entrance — bottom of map
  for(let c=8;c<=10;c++) g[23][c]=2;
  g[23][9]=9;
  g[22][8]=2; g[22][10]=2;

  // Second building (stables?) top-left area
  for(let r=14;r<=18;r++) for(let c=12;c<=16;c++) g[r][c]=1;
  for(let c=12;c<=16;c++){ g[14][c]=2; g[18][c]=2; }
  for(let r=14;r<=18;r++){ g[r][12]=2; g[r][16]=2; }
  g[18][14]=5;

  return g;
}

const WORLD=mkWorld();

// Tile colors — richer palette
const TC={
  0:'#1a2a0e', // grass
  1:'#2a2018', // stone floor
  2:'#141010', // wall
  3:'#0a1828', // water
  4:'#0e1c08', // tree base
  5:'#3a2808', // door
  6:'#6a4a10', // chest
  7:'#3a2810', // table
  8:'#2a2218', // road
  9:'#1a2a10', // stair
};

// Game state
const GS={
  running:false,paused:false,
  p:null,
  enemies:[],projectiles:[],particles:[],
  keys:{},mk:{},
  fr:0,lt:0,raf:null,
  cam:{x:0,y:0}, // camera offset in pixels
  npcs:[],
};
let _HERO=null,_SUB=null;
let VW=0,VH=0,SC=1;

function resizeCv(){
  const cv=document.getElementById('game-canvas');
  VW=window.innerWidth; VH=window.innerHeight;
  cv.width=VW; cv.height=VH;

function startGame(){

  if(!_HERO) return;
  showScreen('game');
  document.getElementById('hud').classList.add('on');
  resizeCv();
  initPlayer();

  setupKeys();
  GS.running=true; GS.paused=false; GS.fr=0;
  GS.lt=performance.now();
  GS.raf=requestAnimationFrame(loop);

function initPlayer(){
  const c=_HERO;
  // Start player outside inn door
  const startX=5*TS+TS/2, startY=11*TS+TS/2;
  const spd={torvin:.9,aeryn:1.25,roland:1.05,coren:.95}[c.id]||1;
  const hp={torvin:6,aeryn:5,roland:4,coren:4}[c.id]||4;
  GS.p={
    x:startX,y:startY,w:32,h:40,
    hp,maxHp:hp,spd:spd*TS*0.05,
    facing:2,af:0,at:0,
    atk:false,atkT:0,atkA:0,inv:0,
    color:c.color,id:c.id,sid:_SUB.id,
    rng:{torvin:44,aeryn:120,roland:48,coren:140}[c.id]||44,
    dmg:{torvin:2,aeryn:1,roland:1,coren:2}[c.id]||1,
    abt:0,
  };
  // Camera starts centered on player
  centerCam();
  updateHUD();
}

function centerCam(){
  const p=GS.p;
  GS.cam.x=p.x-VW/2;
  GS.cam.y=p.y-VH/2;
  clampCam();
}

function clampCam(){
  const maxX=COLS*TS-VW;
  const maxY=ROWS*TS-VH;
  GS.cam.x=Math.max(0,Math.min(maxX,GS.cam.x));
  GS.cam.y=Math.max(0,Math.min(maxY,GS.cam.y));
}

function spawnNPCs(){
  // Party members visible in the inn
  GS.npcs=[
    {id:'torvin',x:4*TS+TS/2,y:7*TS+TS/2,color:'#c8860a',af:0,at:0,facing:2},
    {id:'aeryn', x:6*TS+TS/2,y:7*TS+TS/2,color:'#2ecc71',af:0,at:0,facing:2},
    {id:'roland',x:5*TS+TS/2,y:8*TS+TS/2,color:'#e67e22',af:0,at:0,facing:0},
    {id:'coren', x:4*TS+TS/2,y:8*TS+TS/2,color:'#9b59b6',af:0,at:0,facing:1},
  ].filter(n=>n.id!==_HERO.id);
  GS.npcs.forEach(n=>{ n.combatMode = 'support'; n.atkCd = 0; });
  // Shop NPCs
  GS.shopNPCs = [
    {id:'maret', x:GREYPOST_POS.x, y:GREYPOST_POS.y, icon:'👩', name:'Maret', shop:'greypost', color:'#8B6914'},
    {id:'harwick', x:HARWICKS_POS.x, y:HARWICKS_POS.y, icon:'🧔', name:'Harwick', shop:'harwicks', color:'#c8860a'},
  ];

  // Enemies in dungeon area (bottom of map)
  GS.enemies=[
    {type:'slime',x:9*TS+TS/2,y:20*TS,hp:2,mhp:2,spd:.4,dmg:1,color:'#27ae60',sz:16,ar:22,af:0,at_:0,hf:0,ac:0},
    {type:'skeleton',x:8*TS,y:21*TS,hp:3,mhp:3,spd:.6,dmg:1,color:'#c8b8a0',sz:18,ar:26,af:0,at_:0,hf:0,ac:0},
    {type:'slime',x:11*TS,y:20*TS,hp:2,mhp:2,spd:.4,dmg:1,color:'#27ae60',sz:16,ar:22,af:0,at_:0,hf:0,ac:0},
  ];
}

function loop(ts){
  if(!GS.running) return;
  GS.raf=requestAnimationFrame(loop);
  if(GS.paused) return;
  const dt=Math.min((ts-GS.lt)/16.67,3); GS.lt=ts; GS.fr++;
  update(dt); render();
}

function solidAt(wx,wy){
  const c=Math.floor(wx/TS), r=Math.floor(wy/TS);
  if(r<0||r>=ROWS||c<0||c>=COLS) return true;
  const t=WORLD[r][c];
  return t===2||t===4; // wall or tree
}

function update(dt){
  const p=GS.p;
  const L=GS.keys['ArrowLeft']||GS.keys['KeyA']||GS.mk.left||GS.mk.swipe_left;
  const R=GS.keys['ArrowRight']||GS.keys['KeyD']||GS.mk.right||GS.mk.swipe_right;
  const U=GS.keys['ArrowUp']||GS.keys['KeyW']||GS.mk.up||GS.mk.swipe_up;
  const D=GS.keys['ArrowDown']||GS.keys['KeyS']||GS.mk.down||GS.mk.swipe_down;
  let dx=0,dy=0;
  if(L)dx-=1; if(R)dx+=1; if(U)dy-=1; if(D)dy+=1;
  if(dx&&dy){dx*=.707;dy*=.707;}

  const spd=p.spd*dt;
  if(dx){
    p.x+=dx*spd;
    if(solidAt(p.x-p.w/2,p.y+p.h/4)||solidAt(p.x+p.w/2,p.y+p.h/4)) p.x-=dx*spd;
    p.facing=dx>0?1:3;
  }
  if(dy){
    p.y+=dy*spd;
    if(solidAt(p.x,p.y+p.h/2)||solidAt(p.x-p.w/3,p.y+p.h/2)||solidAt(p.x+p.w/3,p.y+p.h/2)||solidAt(p.x,p.y-p.h/3)) p.y-=dy*spd;
    p.facing=dy>0?2:0;
  }
  if(dx||dy){p.at+=dt;if(p.at>6){p.at=0;p.af=(p.af+1)%4;}}else p.af=0;

  p.x=Math.max(p.w/2,Math.min(COLS*TS-p.w/2,p.x));
  p.y=Math.max(p.h/2,Math.min(ROWS*TS-p.h/2,p.y));

  if(p.atk){p.atkT-=dt;if(p.atkT<=0)p.atk=false;}
  if(p.inv>0)p.inv-=dt;
  if(p.abt>0)p.abt-=dt;

  // Smooth camera follow
  const tcx=p.x-VW/2, tcy=p.y-VH/2;
  GS.cam.x+=(tcx-GS.cam.x)*0.12;
  GS.cam.y+=(tcy-GS.cam.y)*0.12;
  clampCam();

  // Enemies
  GS.enemies.forEach(e=>{
    if(e.hf>0)e.hf-=dt; if(e.ac>0)e.ac-=dt;
    const ex=p.x-e.x,ey=p.y-e.y,dist=Math.hypot(ex,ey)||1;
    if(dist<280){
      if(dist>e.ar+4){e.x+=ex/dist*e.spd*dt;e.y+=ey/dist*e.spd*dt;}
      if(dist<e.ar&&e.ac<=0&&p.inv<=0){p.hp-=e.dmg;p.inv=70;e.ac=90;burst(p.x,p.y,'#e74c3c',5);if(p.hp<=0)gameOver();}
    }
    e.at_+=dt;if(e.at_>12){e.at_=0;e.af=(e.af+1)%2;}
  });

  // Projectiles
  GS.projectiles=GS.projectiles.filter(pr=>{
    pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;
    if(pr.life<=0||solidAt(pr.x,pr.y))return false;
    GS.enemies.forEach(e=>{if(Math.hypot(e.x-pr.x,e.y-pr.y)<e.sz+pr.sz){hitE(e,pr.dmg);pr.life=0;}});
    return pr.life>0;
  });

  // Particles
  GS.particles=GS.particles.filter(pt=>{pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.life-=dt;pt.vx*=.91;pt.vy*=.91;return pt.life>0;});

  updateHUD();
  checkNPCProximity();
  checkShopProximity();
  updateWard(dt);
  updateCorenNPCAttack(dt);
  updateStunned(dt);
  updateNPCCombat(dt);
}

function hitE(e,dmg){
  e.hp-=dmg;e.hf=10;burst(e.x,e.y,e.color,5);
  if(e.hp<=0){GS.enemies=GS.enemies.filter(x=>x!==e);burst(e.x,e.y,e.color,10);dropGold(e);}
}

function atk(){
  const p=GS.p;if(!p||p.atk)return;
  p.atk=true;p.atkT=14;
  const angs={0:-Math.PI/2,1:0,2:Math.PI/2,3:Math.PI};
  p.atkA=angs[p.facing];
  if(p.id==='aeryn'||p.id==='coren'){
    const d={0:[0,-1],1:[1,0],2:[0,1],3:[-1,0]}[p.facing];
    GS.projectiles.push({x:p.x,y:p.y,vx:d[0]*6,vy:d[1]*6,dmg:p.dmg,color:p.id==='aeryn'?'#2ecc71':'#cc77ff',sz:6,life:70});
  } else {
    GS.enemies.forEach(e=>{if(Math.hypot(e.x-p.x,e.y-p.y)<p.rng)hitE(e,p.dmg);});
  }
  burst(p.x,p.y,p.color,4);
}

function skill(){
  const p=GS.p;if(!p||p.abt>0)return;p.abt=120;
  if(p.id==='torvin'){GS.enemies.forEach(e=>{const d=Math.hypot(e.x-p.x,e.y-p.y)||1;e.x+=(e.x-p.x)/d*64;e.y+=(e.y-p.y)/d*64;hitE(e,1);});burst(p.x,p.y,p.color,14);}
  else if(p.id==='aeryn'){const d={0:[0,-1],1:[1,0],2:[0,1],3:[-1,0]}[p.facing];p.x+=d[0]*TS*2.5;p.y+=d[1]*TS*2.5;burst(p.x,p.y,'#2ecc71',10);}
  else if(p.id==='roland'){p.hp=Math.min(p.maxHp,p.hp+1);burst(p.x,p.y,'#e67e22',12);}
  else if(p.id==='coren'){GS.enemies.forEach(e=>{if(Math.hypot(e.x-p.x,e.y-p.y)<TS*3.5)hitE(e,2);});burst(p.x,p.y,'#9b59b6',20);}
}

function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2+Math.random()*.5;
    GS.particles.push({x,y,vx:Math.cos(a)*(2+Math.random()*2.5),vy:Math.sin(a)*(2+Math.random()*2.5),life:20+Math.random()*10,maxLife:30,color,sz:3+Math.random()*3});
  }
}

// ─── RENDER ───
function render(){
  const cv=document.getElementById('game-canvas');
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,VW,VH);

  const cx=Math.round(GS.cam.x), cy=Math.round(GS.cam.y);

  // Draw tiles
  drawWorld(ctx,cx,cy);

  // Particles under characters
  GS.particles.forEach(pt=>{
    ctx.globalAlpha=Math.max(0,pt.life/pt.maxLife);
    ctx.fillStyle=pt.color;
    ctx.fillRect(pt.x-cx-pt.sz/2,pt.y-cy-pt.sz/2,pt.sz,pt.sz);
  });
  ctx.globalAlpha=1;

  // Projectiles
  GS.projectiles.forEach(pr=>{
    ctx.save();ctx.fillStyle=pr.color;ctx.shadowColor=pr.color;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(pr.x-cx,pr.y-cy,pr.sz,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.shadowBlur=0;
  });

  // Shop NPCs
  (GS.shopNPCs||[]).forEach(n=>{
    const sx=n.x-cx, sy=n.y-cy;
    if(sx<-60||sx>VW+60||sy<-60||sy>VH+60) return;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.ellipse(sx,sy+18,14,5,0,0,Math.PI*2);ctx.fill();
    ctx.font='32px serif';ctx.textAlign='center';ctx.fillText(n.icon,sx,sy);
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(sx-20,sy-38,40,14);
    ctx.fillStyle=n.color;ctx.font='11px VT323,monospace';
    ctx.fillText(n.name.toUpperCase(),sx,sy-27);
    ctx.textAlign='left';
  });
  // NPCs
  GS.npcs.forEach(n=>{
    drawNPC(ctx,n,cx,cy);
  });

  // Enemies
  GS.enemies.forEach(e=>{
    ctx.save();if(e.hf>0)ctx.filter='brightness(3.5)';
    drawEnemy(ctx,e,cx,cy);
    ctx.restore();ctx.filter='none';
    if(e.hp<e.mhp){
      const bw=32,bx=e.x-cx-bw/2,by=e.y-cy-e.sz-10;
      ctx.fillStyle='#1a1a1a';ctx.fillRect(bx,by,bw,4);
      ctx.fillStyle='#e74c3c';ctx.fillRect(bx,by,bw*(e.hp/e.mhp),4);
    }
  });

  // Player
  drawPlayer(ctx,cx,cy);
  drawAtkEffect(ctx,cx,cy);
  drawBonks(ctx,cx,cy);
  drawGoldLabels(ctx,cx,cy);
  drawWardEffect(ctx,cx,cy);
}

function drawWorld(ctx,cx,cy){
  // Visible tile range
  const c0=Math.max(0,Math.floor(cx/TS)-1);
  const c1=Math.min(COLS-1,Math.ceil((cx+VW)/TS)+1);
  const r0=Math.max(0,Math.floor(cy/TS)-1);
  const r1=Math.min(ROWS-1,Math.ceil((cy+VH)/TS)+1);

  for(let r=r0;r<=r1;r++){
    for(let c=c0;c<=c1;c++){
      const t=WORLD[r][c];
      const x=c*TS-cx, y=r*TS-cy;
      drawTile(ctx,t,x,y,r,c);
    }
  }
}

function drawTile(ctx,t,x,y,r,c){
  if(t===0){ // GRASS
    ctx.fillStyle='#1e3010';ctx.fillRect(x,y,TS,TS);
    // Grass texture — subtle variation
    ctx.fillStyle='#1a2c0e';
    if((r*COLS+c)%3===0)ctx.fillRect(x+8,y+16,4,8);
    if((r*COLS+c)%5===1)ctx.fillRect(x+32,y+8,3,6);
    if((r*COLS+c)%7===2)ctx.fillRect(x+48,y+36,4,6);
    if((r*COLS+c)%4===0)ctx.fillRect(x+20,y+44,3,8);
    // Highlight blade tips
    ctx.fillStyle='#243814';
    if((r*COLS+c)%3===0)ctx.fillRect(x+8,y+14,3,3);
    if((r*COLS+c)%5===1)ctx.fillRect(x+32,y+6,2,3);
  }
  else if(t===8){ // ROAD
    ctx.fillStyle='#2e2620';ctx.fillRect(x,y,TS,TS);
    // Road texture
    ctx.fillStyle='#282018';
    ctx.fillRect(x+4,y+4,TS-8,TS-8);
    ctx.fillStyle='#322a22';
    if((r+c)%2===0)ctx.fillRect(x+10,y+10,TS-20,TS-20);
    // Center line dashes
    ctx.fillStyle='#3a3020';
    if(r%3===0)ctx.fillRect(x+TS/2-2,y+4,4,TS-8);
  }
  else if(t===1){ // STONE FLOOR
    ctx.fillStyle='#2a2218';ctx.fillRect(x,y,TS,TS);
    // Stone tile grid
    ctx.fillStyle='#221a12';
    ctx.fillRect(x,y+TS/2-1,TS,2);
    ctx.fillRect(x+TS/2-1,y,2,TS);
    // Individual tile coloring
    ctx.fillStyle=(r+c)%2===0?'#2e2618':'#26201a';
    ctx.fillRect(x+2,y+2,TS/2-3,TS/2-3);
    ctx.fillRect(x+TS/2+1,y+TS/2+1,TS/2-3,TS/2-3);
    ctx.fillStyle=(r+c)%2===0?'#26201a':'#2e2618';
    ctx.fillRect(x+TS/2+1,y+2,TS/2-3,TS/2-3);
    ctx.fillRect(x+2,y+TS/2+1,TS/2-3,TS/2-3);
  }
  else if(t===2){ // WALL
    ctx.fillStyle='#141010';ctx.fillRect(x,y,TS,TS);
    // Stone blocks
    ctx.fillStyle='#181414';
    if(r%2===0){
      ctx.fillRect(x+1,y+1,TS-2,TS/2-2);
      ctx.fillRect(x+1,y+TS/2+1,TS/2-2,TS/2-2);
      ctx.fillRect(x+TS/2+1,y+TS/2+1,TS/2-2,TS/2-2);
    } else {
      ctx.fillRect(x+1,y+1,TS/2-2,TS/2-2);
      ctx.fillRect(x+TS/2+1,y+1,TS/2-2,TS/2-2);
      ctx.fillRect(x+1,y+TS/2+1,TS-2,TS/2-2);
    }
    ctx.fillStyle='#201c18';ctx.fillRect(x,y,TS,3);
    // Occasional moss
    if((r*COLS+c)%9===4){ctx.fillStyle='#182a10';ctx.fillRect(x+14,y+20,4,18);}
  }
  else if(t===3){ // WATER
    const wv=GS.fr*.04;
    const d=Math.sin(wv+c*.8+r*.6)*3;
    ctx.fillStyle=`hsl(210,55%,${9+d}%)`;ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='rgba(100,160,240,.1)';
    ctx.fillRect(x,y+6+Math.sin(wv+c)*6,TS,6);
    ctx.fillRect(x,y+26+Math.sin(wv+c+1)*5,TS,5);
    ctx.fillRect(x,y+46+Math.sin(wv+c+2)*5,TS,4);
    // Sparkle
    if((GS.fr+r*7+c*3)%45===0){
      ctx.fillStyle='rgba(160,200,255,.5)';
      ctx.fillRect(x+Math.floor(Math.sin(wv*3+c)*20)+22,y+10,3,3);
    }
  }
  else if(t===4){ // TREE
    ctx.fillStyle='#0e1c08';ctx.fillRect(x,y,TS,TS);
    // Trunk
    ctx.fillStyle='#3a2008';ctx.fillRect(x+TS/2-5,y+TS/2,10,TS/2);
    ctx.fillStyle='#4a2c10';ctx.fillRect(x+TS/2-4,y+TS/2+2,8,TS/2-4);
    // Canopy layers
    ctx.fillStyle='#1e3a10';
    ctx.beginPath();ctx.ellipse(x+TS/2,y+TS/2,TS/2-4,TS/2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#284e14';
    ctx.beginPath();ctx.ellipse(x+TS/2,y+TS/2-8,TS/2-8,TS/3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#32601a';
    ctx.beginPath();ctx.ellipse(x+TS/2,y+TS/2-16,TS/2-12,TS/4,0,0,Math.PI*2);ctx.fill();
    // Top highlight
    ctx.fillStyle='rgba(80,150,30,.2)';
    ctx.beginPath();ctx.ellipse(x+TS/2-4,y+TS/2-18,6,4,-.5,0,Math.PI*2);ctx.fill();
  }
  else if(t===5){ // DOOR
    ctx.fillStyle='#3a2808';ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='#5a3e18';ctx.fillRect(x+4,y+4,TS-8,TS-8);
    for(let p2=0;p2<3;p2++){ctx.fillStyle=p2%2===0?'#6a4a20':'#5a3e18';ctx.fillRect(x+4,y+4+p2*(TS-8)/3,TS-8,(TS-8)/3-1);}
    ctx.fillStyle='#c8860a';ctx.fillRect(x+TS/2-3,y+TS/2-5,6,10);
    ctx.beginPath();ctx.arc(x+TS/2,y+TS/2+5,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c8860a';ctx.lineWidth=2;ctx.strokeRect(x+4,y+4,TS-8,TS-8);
  }
  else if(t===6){ // CHEST
    ctx.fillStyle='#1e1a14';ctx.fillRect(x,y,TS,TS);
    // Draw chest with glow
    ctx.fillStyle='#6a4a10';ctx.fillRect(x+8,y+20,TS-16,TS-28);
    ctx.fillStyle='#8a6a20';ctx.fillRect(x+8,y+12,TS-16,12);
    ctx.fillStyle='#c8860a';ctx.fillRect(x+8,y+22,TS-16,3);
    ctx.fillStyle='#f1c40f';ctx.fillRect(x+TS/2-4,y+18,8,6);
    ctx.save();ctx.shadowColor='#c8860a';ctx.shadowBlur=14;
    ctx.fillStyle='rgba(200,134,10,.12)';ctx.fillRect(x,y,TS,TS);ctx.restore();
  }
  else if(t===7){ // TABLE
    ctx.fillStyle='#1e1a14';ctx.fillRect(x,y,TS,TS);
    // Table top
    ctx.fillStyle='#5a3a14';ctx.fillRect(x+4,y+TS/3,TS-8,TS/3);
    ctx.fillStyle='#6a4a1c';ctx.fillRect(x+6,y+TS/3+2,TS-12,TS/3-4);
    // Table legs
    ctx.fillStyle='#3a2408';ctx.fillRect(x+6,y+TS/3+TS/3,5,TS/3);ctx.fillRect(x+TS-11,y+TS/3+TS/3,5,TS/3);
    // Items on table — mugs/candles
    ctx.fillStyle='#8a6030';ctx.fillRect(x+TS/2-3,y+TS/3-8,6,8);
    ctx.fillStyle='#f1c40f';ctx.fillRect(x+TS/2-1,y+TS/3-10,2,3);
  }
  else if(t===9){ // STAIR / DUNGEON ENTRANCE
    ctx.fillStyle='#1a1410';ctx.fillRect(x,y,TS,TS);
    const sh=Math.floor(TS/5);
    for(let s=0;s<5;s++){
      ctx.fillStyle=s%2===0?'#282018':'#201810';
      ctx.fillRect(x+s*3,y+s*sh,TS-s*6,sh);
      ctx.fillStyle='rgba(80,60,20,.3)';
      ctx.fillRect(x+s*3,y+s*sh,TS-s*6,2);
    }
    ctx.strokeStyle='#c8860a';ctx.lineWidth=1;ctx.strokeRect(x+3,y+3,TS-6,TS-6);
    // Glow
    ctx.save();ctx.shadowColor='#c8860a';ctx.shadowBlur=16;
    ctx.strokeStyle='#c8860a44';ctx.lineWidth=2;ctx.strokeRect(x+6,y+6,TS-12,TS-12);
    ctx.restore();
  }
}

function drawPlayer(ctx,cx,cy){
  const p=GS.p;if(!p)return;
  if(p.inv>0&&Math.floor(GS.fr/3)%2===0)return;
  const px=Math.round(p.x-cx-p.w/2), py=Math.round(p.y-cy-p.h/2);
  const bob=p.af%2===1?-2:0;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.ellipse(p.x-cx,p.y-cy+p.h/2+4,p.w/2+2,7,0,0,Math.PI*2);ctx.fill();
  drawSpr(ctx,p,px,py+bob);
}

function drawSpr(ctx,p,px,py){
  const f=p.facing,af=p.af,w=p.w,h=p.h;
  const id=p.id;
  if(id==='torvin') dTorvin(ctx,px,py,f,af,w,h,p.sid);
  else if(id==='aeryn') dAeryn(ctx,px,py,f,af,w,h);
  else if(id==='roland') dRoland(ctx,px,py,f,af,w,h);
  else if(id==='coren') dCoren(ctx,px,py,f,af,w,h);
}

function dTorvin(ctx,x,y,f,af,w,h,sid){
  const lw=af%2===0?0:4,rw=4-lw;
  // Boots
  ctx.fillStyle='#2a1004';ctx.fillRect(x+4,y+h-10,12,10);ctx.fillRect(x+w-16,y+h-10,12,10);
  ctx.fillStyle='#3a1a08';ctx.fillRect(x+3,y+h-5,13,5);ctx.fillRect(x+w-16,y+h-5,13,5);
  // Legs
  ctx.fillStyle='#4a3820';ctx.fillRect(x+4,y+h-24,12,14+lw);ctx.fillRect(x+w-16,y+h-24,12,14+rw);
  ctx.fillStyle='#5a4828';ctx.fillRect(x+5,y+h-22,10,5);ctx.fillRect(x+w-15,y+h-22,10,5);
  // Body chainmail
  ctx.fillStyle='#5a4510';ctx.fillRect(x+2,y+14,w-4,14);
  ctx.fillStyle='#6a5520';
  for(let i=0;i<3;i++) for(let j=0;j<4;j++) ctx.fillRect(x+4+j*6,y+16+i*4,4,3);
  // Belt
  ctx.fillStyle='#3a2808';ctx.fillRect(x+2,y+26,w-4,4);
  ctx.fillStyle='#c8860a';ctx.fillRect(x+w/2-3,y+26,6,4);
  // Arms
  ctx.fillStyle='#5a4510';ctx.fillRect(x-2,y+14,6,16);ctx.fillRect(x+w-4,y+14,6,16);
  ctx.fillStyle='#7a6020';ctx.fillRect(x-3,y+26,8,7);ctx.fillRect(x+w-5,y+26,8,7);
  // Neck
  ctx.fillStyle='#c8a070';ctx.fillRect(x+w/2-5,y+10,10,6);
  // Head
  ctx.fillStyle='#c8a070';ctx.fillRect(x+6,y+2,w-12,14);
  // Beard
  ctx.fillStyle='#8B6914';ctx.fillRect(x+6,y+12,w-12,7);ctx.fillRect(x+8,y+17,w-16,6);
  ctx.fillStyle='#9a7a20';ctx.fillRect(x+9,y+13,5,5);ctx.fillRect(x+w-14,y+13,5,5);
  // Helmet
  ctx.fillStyle='#7a5a1a';ctx.fillRect(x+4,y-2,w-8,8);ctx.fillRect(x+2,y+4,w-4,6);
  ctx.fillStyle='#9a7a2a';ctx.fillRect(x+5,y-1,w-10,4);
  ctx.fillStyle='#c8860a';ctx.fillRect(x-2,y+2,5,4);ctx.fillRect(x+w-3,y+2,5,4);
  ctx.fillRect(x-3,y-1,4,4);ctx.fillRect(x+w-1,y-1,4,4);
  // Eyes
  ctx.fillStyle='#111';
  if(f===2){ctx.fillRect(x+8,y+7,4,3);ctx.fillRect(x+w-12,y+7,4,3);}
  else if(f===0){ctx.fillRect(x+8,y+8,4,3);ctx.fillRect(x+w-12,y+8,4,3);}
  else if(f===1){ctx.fillRect(x+w-10,y+7,4,3);}
  else{ctx.fillRect(x+6,y+7,4,3);}
  // Axe
  ctx.fillStyle='#4a3808';ctx.fillRect(x+w+2,y+8,4,24);
  ctx.fillStyle='#9a9a9a';ctx.fillRect(x+w+2,y+4,7,10);ctx.fillRect(x+w-1,y+7,8,5);
  ctx.fillStyle='#c0c0c0';ctx.fillRect(x+w+3,y+5,5,8);
  ctx.fillStyle='#c8860a';ctx.fillRect(x+w+2,y+12,5,4);
}

function dAeryn(ctx,x,y,f,af,w,h){
  const lw=af%2===0?0:4,rw=4-lw;
  ctx.fillStyle='#2a1808';ctx.fillRect(x+4,y+h-10,11,10);ctx.fillRect(x+w-15,y+h-10,11,10);
  ctx.fillStyle='#3a2010';ctx.fillRect(x+3,y+h-5,12,5);ctx.fillRect(x+w-15,y+h-5,12,5);
  ctx.fillStyle='#1a3a1a';ctx.fillRect(x+4,y+h-24,11,14+lw);ctx.fillRect(x+w-15,y+h-24,11,14+rw);
  // Cloak
  ctx.fillStyle='#1a3020';ctx.fillRect(x,y+12,w,16);
  ctx.fillStyle='#243828';ctx.fillRect(x+3,y+13,w-6,13);
  ctx.fillStyle='#4a3010';ctx.fillRect(x+6,y+12,w-12,12);
  ctx.fillStyle='#5a4018';ctx.fillRect(x+8,y+14,6,5);ctx.fillRect(x+w-14,y+14,6,5);
  ctx.fillStyle='#2a1808';ctx.fillRect(x+2,y+22,w-4,4);
  ctx.fillStyle='#8B6914';ctx.fillRect(x+w/2-4,y+22,8,4);
  ctx.fillStyle='#182818';ctx.fillRect(x-2,y+14,4,20);ctx.fillRect(x+w-2,y+14,4,20);

function drawNPC(ctx,n,cx,cy){
  const nx=Math.round(n.x-cx-16),ny=Math.round(n.y-cy-20);
  // Simple bobbing NPC sprites
  const bob=Math.sin(GS.fr*.06+n.x)*.8|0;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(n.x-cx,n.y-cy+22,14,5,0,0,Math.PI*2);ctx.fill();
  // Draw same sprite but slightly smaller via transform
  ctx.save();ctx.translate(n.x-cx,n.y-cy+bob);ctx.scale(.85,.85);ctx.translate(-(n.x-cx),-(n.y-cy+bob));
  const fakep={id:n.id,facing:n.facing,af:Math.floor(GS.fr/12)%4,w:32,h:40,sid:'knight',color:n.color};
  drawSpr(ctx,fakep,Math.round(n.x-cx-16),Math.round(n.y-cy+bob-20));
  ctx.restore();
  // Name label above
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(n.x-cx-18,n.y-cy-32,36,14);
  ctx.fillStyle=n.color;ctx.font='10px VT323,monospace';ctx.textAlign='center';
  ctx.fillText(n.id.toUpperCase(),n.x-cx,n.y-cy-20);ctx.textAlign='left';
}

function drawEnemy(ctx,e,cx,cy){
  const bob=Math.sin(GS.fr*.1+e.x)*2;
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(e.x-cx,e.y-cy+e.sz/2+3,e.sz/2+2,5,0,0,Math.PI*2);ctx.fill();
  if(e.type==='slime') drawBigSlime(ctx,e,cx,cy,bob);
  else drawBigSkel(ctx,e,cx,cy,bob);
}

function drawBigSlime(ctx,e,cx,cy,bob){
  const x=e.x-cx,y=e.y-cy+bob;
  const sq=1+Math.sin(GS.fr*.14)*.1;
  const sz=e.sz;
  ctx.save();ctx.shadowColor=e.color;ctx.shadowBlur=10;
  ctx.fillStyle=e.color+'55';ctx.beginPath();ctx.ellipse(x,y,sz*sq+6,sz/sq+6,0,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.fillStyle=e.color;ctx.beginPath();ctx.ellipse(x,y,sz*sq,sz/sq,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.ellipse(x-3,y-3,sz*.55,sz*.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.ellipse(x-5,y-5,6,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x-6,y-2,5,6,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+6,y-2,5,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(x-5,y-1,3,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+7,y-1,3,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';ctx.fillRect(x-6,y-2,2,2);ctx.fillRect(x+6,y-2,2,2);
  ctx.strokeStyle='#1a4a1a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-5,y+5);ctx.quadraticCurveTo(x,y+9+Math.sin(GS.fr*.18)*2,x+5,y+5);ctx.stroke();
  if(GS.fr%50<25){ctx.fillStyle=e.color+'bb';ctx.beginPath();ctx.ellipse(x+3,y+sz+4,3,4,0,0,Math.PI*2);ctx.fill();}
}

function drawBigSkel(ctx,e,cx,cy,bob){
  const x=Math.round(e.x-cx),y=Math.round(e.y-cy+bob);
  const sw=Math.sin(GS.fr*.12)*6;
  const lsw=Math.sin(GS.fr*.12+1)*5;
  const bone='#ccc0aa',dark='#8a7860',jnt='#b0a090';
  // Legs
  ctx.fillStyle=bone;ctx.fillRect(x-6,y+7,6,12+lsw);ctx.fillRect(x+1,y+7,6,12-lsw);
  ctx.fillStyle=jnt;ctx.fillRect(x-7,y+12,8,5);ctx.fillRect(x,y+12,8,5);
  ctx.fillStyle=bone;ctx.fillRect(x-9,y+17+lsw,9,5);ctx.fillRect(x,y+17-lsw,9,5);
  // Pelvis
  ctx.fillStyle=dark;ctx.fillRect(x-7,y+5,15,6);ctx.fillStyle=bone;ctx.fillRect(x-6,y+6,13,4);
  // Ribcage
  ctx.fillStyle=bone;ctx.fillRect(x-7,y-10,15,17);
  ctx.fillStyle='#1a1410';ctx.fillRect(x-5,y-8,11,13);
  ctx.strokeStyle=bone;ctx.lineWidth=2;
  for(let i=0;i<4;i++){const ry=y-7+i*3;ctx.beginPath();ctx.moveTo(x-5,ry);ctx.lineTo(x-9,ry+1);ctx.stroke();ctx.beginPath();ctx.moveTo(x+5,ry);ctx.lineTo(x+9,ry+1);ctx.stroke();}
  for(let sp=0;sp<4;sp++) ctx.fillRect(x-1,y-9+sp*4,3,3);
  // Arms
  ctx.fillStyle=bone;
  ctx.fillRect(x-12,y-8+sw,5,10);ctx.fillRect(x-13,y-4+sw,4,3);ctx.fillRect(x-12,y-1+sw,5,10);
  ctx.fillRect(x+8,y-8-sw,5,10);ctx.fillRect(x+9,y-4-sw,4,3);ctx.fillRect(x+8,y-1-sw,5,10);
  ctx.fillStyle=dark;ctx.fillRect(x-15,y+7+sw,7,4);ctx.fillRect(x+9,y+7-sw,7,4);
  ctx.fillStyle=bone;ctx.fillRect(x-8,y-11,6,3);ctx.fillRect(x+3,y-11,6,3);
  // Skull
  ctx.fillStyle=bone;ctx.fillRect(x-7,y-28,15,18);
  ctx.fillStyle='#d4c8b0';ctx.fillRect(x-6,y-28,13,10);ctx.fillRect(x-5,y-27,11,4);
  ctx.fillStyle='#111';ctx.fillRect(x-6,y-22,6,6);ctx.fillRect(x+1,y-22,6,6);
  ctx.fillStyle='rgba(255,100,0,.85)';ctx.fillRect(x-5,y-21,4,4);ctx.fillRect(x+2,y-21,4,4);
  ctx.save();ctx.shadowColor='#ff6600';ctx.shadowBlur=8;
  ctx.fillStyle='#ff8800';ctx.fillRect(x-5,y-21,3,3);ctx.fillRect(x+3,y-21,3,3);ctx.restore();
  ctx.fillStyle='#1a1410';ctx.fillRect(x-1,y-17,3,4);
  ctx.fillStyle=bone;ctx.fillRect(x-5,y-13,4,4);ctx.fillRect(x-1,y-13,3,4);ctx.fillRect(x+2,y-13,4,4);
  ctx.fillStyle='#111';ctx.fillRect(x-4,y-12,3,3);ctx.fillRect(x,y-12,2,3);ctx.fillRect(x+3,y-12,3,3);
}

function drawAtkEffect(ctx,cx,cy){
  const p=GS.p;if(!p||!p.atk||p.id==='aeryn'||p.id==='coren')return;
  const alpha=(1-(p.atkT/14))*.85;
  ctx.save();ctx.translate(p.x-cx,p.y-cy);ctx.globalAlpha=alpha;
  ctx.strokeStyle=p.color;ctx.lineWidth=4;ctx.shadowColor=p.color;ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(0,0,p.rng,p.atkA-.95,p.atkA+.95);ctx.stroke();
  ctx.fillStyle=p.sid==='berserker'?'#c0c0c0':'#d4c090';
  ctx.fillRect(Math.cos(p.atkA)*p.rng-5,Math.sin(p.atkA)*p.rng-5,10,10);
  ctx.restore();ctx.globalAlpha=1;ctx.shadowBlur=0;
}

function updateHUD(){
  const p=GS.p;if(!p||!_HERO)return;
  document.getElementById('hud-name').textContent=_HERO.name;
  document.getElementById('hud-name').style.color=p.color;
  document.getElementById('hud-sub').textContent=_SUB.name.toUpperCase();
  document.getElementById('hud-sub').style.color=_SUB.color;
  let h='';for(let i=0;i<p.maxHp;i++)h+=i<p.hp?'\u2665':'\u2661';
  document.getElementById('hud-hearts').textContent=h;
  document.getElementById('hud-hearts').style.color=p.hp<=1?'#e74c3c':p.color;
  const goldEl=document.getElementById('hud-gold');
  if(goldEl) goldEl.textContent='🪙 '+ECONOMY.gold;
  drawMinimap();
}

function drawMinimap(){
  const mm=document.getElementById('minimap');
  const ctx=mm.getContext('2d');
  const mw=88,mh=88;
  ctx.fillStyle='#000';ctx.fillRect(0,0,mw,mh);
  const sc=mw/COLS;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const t=WORLD[r][c];
      const mc={0:'#1e3010',1:'#2a2018',2:'#0e0c0a',3:'#0a1828',4:'#0e1c08',5:'#5a3810',6:'#c8860a',7:'#3a2810',8:'#2a2218',9:'#8B6914'}[t]||'#111';
      ctx.fillStyle=mc;
      ctx.fillRect(c*(mw/COLS),r*(mh/ROWS),mw/COLS-0.5,mh/ROWS-0.5);
    }
  }
  // Player dot
  const p=GS.p;
  if(p){
    const px=(p.x/TS/COLS)*mw, py=(p.y/TS/ROWS)*mh;
    ctx.save();ctx.shadowColor=_HERO.color;ctx.shadowBlur=4;
    ctx.fillStyle=_HERO.color;ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function showLbl(txt){
  const el=document.getElementById('room-lbl');
  el.textContent=txt;el.classList.add('on');
  clearTimeout(window._lblT);
  window._lblT=setTimeout(()=>el.classList.remove('on'),2500);
}

let _keysSetup=false;
function setupKeys(){
  if(_keysSetup)return;_keysSetup=true;
  document.addEventListener('keydown',e=>{
    if(GS.keys[e.code])return;GS.keys[e.code]=true;
    if(!GS.running||GS.paused)return;
    if(e.code==='KeyE'||e.code==='KeyF') {
      if(window._nearShop&&!dlgOpen&&!activeShop){ openShop(window._nearShop); return; }
      if(nearNPC&&!dlgOpen) openDlg(nearNPC.id);
      return;
    }
    if(e.code==='Space'||e.code==='KeyZ'||e.code==='KeyJ') atk();
    if(e.code==='KeyX'||e.code==='KeyK') skill();
    if(e.code==='Escape') { if(activeShop){closeShop();return;} if(dlgOpen){closeDlg();return;} togglePause(); return; }
    if(e.code==='KeyP') togglePause();
    if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
  });
  document.addEventListener('keyup',e=>GS.keys[e.code]=false);
}

  updateNPCBehavior(id);
}

function showApprovalFlash(id, delta){
  const el = document.getElementById('approval-flash');
  const char = CHARACTERS.find(c=>c.id===id);
  if(!char) return;
  el.style.color = delta > 0 ? '#2ecc71' : '#e74c3c';
  el.textContent = (delta>0?'▲ ':'▼ ') + char.name + ' ' + (delta>0?'+'+delta:delta);
  el.classList.add('show');
  clearTimeout(window._aflashT);
  window._aflashT = setTimeout(()=>el.classList.remove('show'), 1800);
}

function updateNPCBehavior(id){
  const npc = GS.npcs.find(n=>n.id===id);
  if(!npc) return;
  const appr = getApproval(id);
  npc.combatMode = appr >= 70 ? 'aggressive' : appr >= 40 ? 'support' : 'passive';
}

// ── INTERACTION DETECTION ──
const INTERACT_RANGE = 72;
let nearNPC = null;

function checkNPCProximity(){
  const p = GS.p;
  if(!p) return;
  nearNPC = null;
  let best = INTERACT_RANGE;
  GS.npcs.forEach(n=>{
    const d = Math.hypot(p.x-n.x, p.y-n.y);
    if(d < best){ best=d; nearNPC=n; }
  });
  const prompt = document.getElementById('interact-prompt');
  if(nearNPC && !dlgOpen){
    const char = CHARACTERS.find(c=>c.id===nearNPC.id);
    prompt.textContent = `E · TALK TO ${(char?char.name:'???').toUpperCase()}`;
    prompt.classList.add('on');
  } else {
    prompt.classList.remove('on');
  }
}

function openDlg(npcId){
  const char = CHARACTERS.find(c=>c.id===npcId);
  if(!char) return;
  const dlgData = DIALOGUES[npcId];
  if(!dlgData) return;

  dlgOpen = true;
  dlgNPC = npcId;
  GS.paused = true;

  // Style the box
  const box = document.getElementById('dialogue-box');
  box.style.setProperty('--dclr', dlgData.color);
  box.classList.add('on');

  document.getElementById('dlg-portrait').textContent = dlgData.portrait;
  document.getElementById('dlg-name-tab').textContent = char.name.toUpperCase();
  document.getElementById('dlg-name-tab').style.color = dlgData.color;
  document.getElementById('dlg-portrait').style.setProperty('--dclr', dlgData.color);

  // Pick entry point
  let startNode;
  if(!PARTY.talked[npcId]){
    PARTY.talked[npcId] = true;
    startNode = 'greeting';
  } else {
    // Pick best followup
    const appr = getApproval(npcId);
    const candidates = dlgData.followup.filter(f=>appr >= f.minApproval);
    if(candidates.length){
      // Show as ad-hoc node
      const convo = candidates[Math.floor(Math.random()*candidates.length)];
      showDlgNode(convo, dlgData);
      return;
    }
    startNode = 'investigate';
  }

  showDlgNode(dlgData[startNode], dlgData);
}

function showDlgNode(node, dlgData){
  if(!node) return;
  const textEl = document.getElementById('dlg-text');
  const choicesEl = document.getElementById('dlg-choices');
  choicesEl.innerHTML = '';

  // Build display text
  let display = node.text || '';
  if(node.subtext) display += `<br><span class="dlg-sub">${node.subtext}</span>`;
  typeDialogue(display, textEl, ()=>{
    (node.choices||[]).forEach((ch,i)=>{
      const btn = document.createElement('button');
      btn.className = 'dlg-choice';

      // Prefix: investigation choices get a subtle indicator
      const prefix = ch.goto ? '' : ch.back ? '' : '';
      btn.textContent = ch.text;
      btn.onclick = ()=>handleDlgChoice(ch, node, dlgData);
      choicesEl.appendChild(btn);
    });
  });
}

function handleDlgChoice(choice, node, dlgData){
  const choicesEl = document.getElementById('dlg-choices');
  const textEl = document.getElementById('dlg-text');
  choicesEl.innerHTML = '';

  // Apply approval delta if any
  if(choice.delta){ changeApproval(dlgNPC, choice.delta); }

  // Navigation choices (goto / back)
  if(choice.goto){
    // Navigate to named node
    const nextNode = dlgData[choice.goto];
    if(nextNode){
      // If the choice has a subtext_before, flash it briefly
      if(choice.subtext_before){
        let display = `<span class="dlg-sub">${choice.subtext_before}</span>`;
        typeDialogue(display, textEl, ()=>{
          setTimeout(()=>showDlgNode(nextNode, dlgData), 600);
        });
      } else {
        showDlgNode(nextNode, dlgData);
      }
    }
    return;
  }

  if(choice.back){
    // Show reply, then go back to named node
    let replyText = choice.reply || '';
    if(choice.reply2) replyText += '<br>' + choice.reply2;
    if(choice.subtext) replyText += `<br><span class="dlg-sub">${choice.subtext}</span>`;
    typeDialogue(replyText, textEl, ()=>{
      setTimeout(()=>{
        const backNode = dlgData[choice.back];
        if(backNode) showDlgNode(backNode, dlgData);
      }, 900);
    });
    return;
  }

  // Terminal choice — show reply and close
  let replyText = choice.reply || '';
  if(choice.reply2) replyText += '<br>' + choice.reply2;
  if(choice.subtext) replyText += `<br><span class="dlg-sub">${choice.subtext}</span>`;

  typeDialogue(replyText, textEl, ()=>{
    const closeBtn = document.createElement('button');
    closeBtn.className = 'dlg-choice';
    closeBtn.textContent = '→ [End conversation]';
    closeBtn.onclick = ()=>closeDlg();
    choicesEl.appendChild(closeBtn);
  });
}

// handleDlgChoice defined above

function typeDialogue(html, el, onDone){
  clearTimeout(dlgTypeTimer);
  el.innerHTML = '';
  // Simple approach: set full HTML immediately for rich text, 
  // then animate with a reveal mask
  el.innerHTML = html.replace(/\n/g,'<br>');
  el.style.opacity='0';
  el.style.transform='translateY(4px)';
  requestAnimationFrame(()=>{
    el.style.transition='opacity .25s,transform .25s';
    el.style.opacity='1';
    el.style.transform='none';
  });
  dlgTypeTimer = setTimeout(onDone, 300);
}

function closeDlg(){
  dlgOpen = false;
  dlgNPC = null;
  GS.paused = false;
  document.getElementById('dialogue-box').classList.remove('on');
  document.getElementById('interact-prompt').classList.remove('on');
  // Resume game
  if(GS.running){
    GS.lt = performance.now();
    GS.raf = requestAnimationFrame(loop);
  }
}

// ── WEAPON SYSTEM ──
// Roland: dagger + lute bash
// Aeryn: bow primary (ranged), auto-dagger when close
// Torvin: axe (berserker) or sword+shield (knight)

function getAttackType(p){
  if(p.id==='aeryn'){
    // Auto-switch: dagger if enemy within 50px, else bow
    const nearEnemy = GS.enemies.some(e=>Math.hypot(e.x-p.x,e.y-p.y)<55);
    return nearEnemy ? 'dagger' : 'bow';
  }
  if(p.id==='roland') return 'dagger';
  if(p.id==='torvin') return p.sid==='knight' ? 'sword' : 'axe';
  if(p.id==='coren') return 'staff';
  return 'melee';
}

function getSkillType(p){
  if(p.id==='roland') return 'lute_bash';
  if(p.id==='aeryn') return 'dash';
  if(p.id==='torvin') return p.sid==='knight' ? 'shield_bash' : 'rage_cleave';
  if(p.id==='coren') return 'nova';
  return 'generic';
}

// Stun system
const STUNNED = new Map(); // enemy -> frames remaining

function isStunned(e){ return (STUNNED.get(e)||0) > 0; }

// ── COMBAT OVERHAUL ──
function atk(){
  const p = GS.p;
  if(!p || p.atk) return;
  p.atk = true; p.atkT = 14;
  const angs = {0:-Math.PI/2,1:0,2:Math.PI/2,3:Math.PI};
  p.atkA = angs[p.facing];
  const type = getAttackType(p);

  if(type==='bow'){
    // Ranged arrow
    const d = {0:[0,-1],1:[1,0],2:[0,1],3:[-1,0]}[p.facing];
    GS.projectiles.push({
      x:p.x,y:p.y,vx:d[0]*7,vy:d[1]*7,
      dmg:p.dmg,color:'#c8a040',sz:4,life:80,
      trail:true,type:'arrow'
    });
    spawnArrowParticles(p.x,p.y,p.atkA);
  } else if(type==='dagger'||type==='sword'||type==='axe'||type==='staff'){
    // Melee sweep
    GS.enemies.forEach(e=>{
      if(!isStunned(e) && Math.hypot(e.x-p.x,e.y-p.y)<p.rng) hitE(e,p.dmg);
    });
    burst(p.x,p.y,p.color,4);
  }
  p.lastAtkType = type;
}

function skill(){
  const p = GS.p;
  if(!p || p.abt>0) return;
  p.abt = 120;
  const type = getSkillType(p);

  if(type==='lute_bash'){
    // Roland: lute bash — short range, high damage, stuns
    const bashRange = 60;
    let hit = false;
    GS.enemies.forEach(e=>{
      if(Math.hypot(e.x-p.x,e.y-p.y)<bashRange){
        hitE(e, 3); // bonus damage
        STUNNED.set(e, 90); // stun for 90 frames
        hit = true;
        // Knockback
        const dx=e.x-p.x, dy=e.y-p.y, d=Math.hypot(dx,dy)||1;
        e.x+=dx/d*40; e.y+=dy/d*40;
      }
    });
    // Visual BONK
    showBonk(p.x, p.y, p.color);
    burst(p.x,p.y,'#e67e22',16);
    burst(p.x,p.y,'#f1c40f',8);

  } else if(type==='dash'){
    const d={0:[0,-1],1:[1,0],2:[0,1],3:[-1,0]}[p.facing];
    p.x+=d[0]*TS*2.8; p.y+=d[1]*TS*2.8;
    burst(p.x,p.y,'#2ecc71',10);

  } else if(type==='shield_bash'){
    GS.enemies.forEach(e=>{
      const dist=Math.hypot(e.x-p.x,e.y-p.y);
      if(dist<70){ hitE(e,1); STUNNED.set(e,60); const dx=e.x-p.x,dy=e.y-p.y,d=dist||1; e.x+=dx/d*55;e.y+=dy/d*55; }
    });
    burst(p.x,p.y,p.color,14);

  } else if(type==='rage_cleave'){
    // Wide arc, all nearby
    GS.enemies.forEach(e=>{
      if(Math.hypot(e.x-p.x,e.y-p.y)<p.rng*1.5) hitE(e,p.dmg+1);
    });
    burst(p.x,p.y,'#c0392b',18);

  } else if(type==='nova'){
    GS.enemies.forEach(e=>{ if(Math.hypot(e.x-p.x,e.y-p.y)<TS*3.5) hitE(e,2); });
    burst(p.x,p.y,'#9b59b6',20);
  }
}

    GS.particles.push({
      x:x-Math.cos(angle)*i*8, y:y-Math.sin(angle)*i*8,
      vx:0,vy:0,life:10-i,maxLife:10,color:'#c8a040',sz:2+i*.5

// BONK visual for Roland's lute bash
const BONKS = [];
function showBonk(x,y,color){
  BONKS.push({x,y,life:45,maxLife:45,color});
}
function drawBonks(ctx,cx,cy){
  BONKS.forEach((b,i)=>{
    const prog = 1-(b.life/b.maxLife);
    const scale = .5+prog*.8;
    const alpha = b.life/b.maxLife;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(b.x-cx, b.y-cy-20-prog*30);
    ctx.scale(scale,scale);
    ctx.font=`bold ${Math.floor(20*scale)}px VT323,monospace`;
    ctx.fillStyle=b.color;
    ctx.textAlign='center';
    ctx.shadowColor=b.color; ctx.shadowBlur=8;
    ctx.fillText('BONK!',0,0);
    ctx.restore();
    ctx.shadowBlur=0; ctx.textAlign='left';
    b.life--;
  });
  // Remove dead bonks
  for(let i=BONKS.length-1;i>=0;i--) if(BONKS[i].life<=0) BONKS.splice(i,1);
}

// Update stunned enemies (decrement timers)
function updateStunned(dt){
  STUNNED.forEach((frames,e)=>{
    const next = frames - dt;
    if(next<=0) STUNNED.delete(e);
    else STUNNED.set(e,next);
  });
}

// ── NPC COMBAT BEHAVIOR ──
function updateNPCCombat(dt){
  GS.npcs.forEach(n=>{
    if(!n.combatMode) n.combatMode='support';
    const nearestEnemy = GS.enemies.reduce((best,e)=>{
      const d=Math.hypot(e.x-n.x,e.y-n.y);
      return (!best||d<best.d)?{e,d}:best;
    },null);

    if(n.combatMode==='aggressive' && nearestEnemy && nearestEnemy.d<200){
      // Move toward enemy
      const dx=nearestEnemy.e.x-n.x, dy=nearestEnemy.e.y-n.y, d=nearestEnemy.d||1;
      n.x+=dx/d*0.6*dt; n.y+=dy/d*0.6*dt;
      if(!n.atkCd) n.atkCd=0;
      n.atkCd-=dt;
      if(nearestEnemy.d<45 && n.atkCd<=0){
        hitE(nearestEnemy.e,1);
        n.atkCd=80;
        burst(n.x,n.y,n.color,3);
      }
    } else if(n.combatMode==='support'){
      // Follow player loosely
      const p=GS.p;
      if(p){
        const dx=p.x-n.x+30*(GS.npcs.indexOf(n)%2===0?1:-1);
        const dy=p.y-n.y+30*(GS.npcs.indexOf(n)<2?-1:1);
        const d=Math.hypot(dx,dy);
        if(d>60){ n.x+=dx/d*.4*dt; n.y+=dy/d*.4*dt; }
      }
    }
    // Passive: stay in inn area
  });
}

function buyItem(itemId){
  const item = CATALOGUE[itemId];
  if(!item || ECONOMY.gold < item.price) return;

  ECONOMY.gold -= item.price;

  if(item.consumable){
    INVENTORY[itemId] = (INVENTORY[itemId]||0) + 1;
    showBuyFlash(item.name + ' ×' + INVENTORY[itemId]);
  } else {
    ECONOMY.owned[itemId] = true;
    // Auto-equip if it's an upgrade for the active hero
    autoEquip(itemId, item);
    showBuyFlash(item.name + ' PURCHASED');
  }

  // Refresh shop display
  openShop(activeShop);
  updateHUD();
}

function autoEquip(itemId, item){
  const heroId = _HERO ? _HERO.id : null;
  if(!heroId || !_HERO) return;
  if(item.who !== heroId && item.who !== 'any') return;

  const loadout = LOADOUT[heroId];
  if(!loadout) return;

  // Find which slot this fills
  if(loadout[item.slot] !== undefined){
    // Check if this is a higher tier than current
    const current = CATALOGUE[loadout[item.slot]];
    if(!current || item.tier > current.tier){
      loadout[item.slot] = itemId;
      // Update player stats
      if(GS.p) GS.p.dmg = item.dmg || GS.p.dmg;
    }
  }
}

// Coren NPC offensive bolt
function updateCorenNPCAttack(dt){
  const cNPC = GS.npcs.find(n=>n.id==='coren');
  if(!cNPC) return;
  if(!cNPC.boltCd) cNPC.boltCd = 0;
  cNPC.boltCd -= dt;
  if(cNPC.boltCd > 0) return;

  const appr = getApproval('coren');
  if(appr < 30) return; // passive

  // Find nearest enemy in range
  const nearEnemy = GS.enemies.reduce((best,e)=>{
    const d = Math.hypot(e.x-cNPC.x, e.y-cNPC.y);
    return (!best||d<best.d)&&d<280 ? {e,d} : best;
  }, null);

  if(nearEnemy){
    const dx = nearEnemy.e.x-cNPC.x, dy = nearEnemy.e.y-cNPC.y;
    const d = Math.hypot(dx,dy)||1;
    GS.projectiles.push({
      x:cNPC.x, y:cNPC.y, vx:dx/d*5.5, vy:dy/d*5.5,
      dmg:1, color:'#cc77ff', sz:5, life:60,
      owner:'coren_npc'
    });
    burst(cNPC.x, cNPC.y, '#9b59b6', 3);
    cNPC.boltCd = appr >= 70 ? 80 : 140; // fires faster with high approval
  }
}

const HARWICKS_POS = { x:15*64+32, y:14*64+32 }; // southeast

function checkShopProximity(){
  if(!GS.p || dlgOpen || activeShop) return;
  const p = GS.p;
  const nearGreypost = Math.hypot(p.x-GREYPOST_POS.x, p.y-GREYPOST_POS.y) < SHOP_RANGE;
  const nearHarwicks = Math.hypot(p.x-HARWICKS_POS.x, p.y-HARWICKS_POS.y) < SHOP_RANGE;

  const prompt = document.getElementById('interact-prompt');
  if(nearGreypost){
    prompt.textContent = 'E · ENTER THE GREYPOST';

    window._nearShop = 'greypost';
  } else if(nearHarwicks){
    prompt.textContent = "E · ENTER HARWICK'S IRON";
    prompt.classList.add('on');
    window._nearShop = 'harwicks';
  } else {
    window._nearShop = null;
  }
}



function drawWardEffect(ctx,cx,cy){
  if(!wardActive||!GS.p) return;
  const p=GS.p;
  const prog=wardTimer/WARD_DURATION;
  const pulse=Math.sin(GS.fr*.12)*.2+.8;
  ctx.save();
  ctx.strokeStyle=`rgba(155,89,182,${.5*prog*pulse})`;
  ctx.lineWidth=3;
  ctx.shadowColor='#9b59b6';
  ctx.shadowBlur=12*pulse;
  ctx.beginPath();
  ctx.arc(p.x-cx,p.y-cy,40*pulse,0,Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle=`rgba(200,150,255,${.25*prog*pulse})`;
  ctx.lineWidth=8;
  ctx.beginPath();
  ctx.arc(p.x-cx,p.y-cy,44*pulse,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();ctx.shadowBlur=0;
}

function initSwipe(){
  const canvas = document.getElementById('game-canvas');
  if(!canvas) return;

  canvas.addEventListener('touchstart', e=>{
    if(dlgOpen || activeShop) return;
    const t = e.changedTouches[0];
    swipeStart = {x:t.clientX, y:t.clientY, id:t.identifier};
    swipeActive = false;
    e.preventDefault();
  }, {passive:false});

  canvas.addEventListener('touchmove', e=>{
    if(dlgOpen || activeShop || !swipeStart) return;
    // Find our touch
    let t = null;
    for(let i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===swipeStart.id){t=e.changedTouches[i];break;}
    }
    if(!t) return;

    const dx = t.clientX - swipeStart.x;
    const dy = t.clientY - swipeStart.y;
    const dist = Math.hypot(dx,dy);

    if(dist < SWIPE_DEADZONE){
      // Clear all swipe directions
      GS.mk.swipe_left=false;GS.mk.swipe_right=false;
      GS.mk.swipe_up=false;GS.mk.swipe_down=false;
      return;
    }

    swipeActive = true;

    // Determine dominant direction(s) — allow diagonal
    const absX=Math.abs(dx), absY=Math.abs(dy);
    GS.mk.swipe_left  = dx < -SWIPE_THRESHOLD && absX > absY*0.4;
    GS.mk.swipe_right = dx >  SWIPE_THRESHOLD && absX > absY*0.4;
    GS.mk.swipe_up    = dy < -SWIPE_THRESHOLD && absY > absX*0.4;
    GS.mk.swipe_down  = dy >  SWIPE_THRESHOLD && absY > absX*0.4;

    e.preventDefault();
  }, {passive:false});

  canvas.addEventListener('touchend', e=>{
    for(let i=0;i<e.changedTouches.length;i++){
      if(swipeStart && e.changedTouches[i].identifier===swipeStart.id){
        swipeStart=null; swipeActive=false;
        GS.mk.swipe_left=false;GS.mk.swipe_right=false;
        GS.mk.swipe_up=false;GS.mk.swipe_down=false;
        break;
      }
    }
  }, {passive:true});
}

// Patch mD/mU to include swipe directions in movement check
// (done by reading GS.mk.swipe_* in the update loop)

// ── DRAGGABLE D-PAD ──
const DPAD_STORAGE_KEY = 'ds_dpad_pos';
let dpadDragging = false;
let dpadDragOffset = {x:0,y:0};

function initDpadDrag(){
  const wrap = document.getElementById('dpad-wrap');
  if(!wrap) return;

  // Restore saved position
  try {
    const saved = localStorage.getItem(DPAD_STORAGE_KEY);
    if(saved){
      const pos = JSON.parse(saved);
      wrap.style.bottom = pos.bottom+'px';
      wrap.style.left   = pos.left+'px';
      wrap.style.top    = 'auto';
      wrap.style.right  = 'auto';
    }
  } catch(e){}

  // TWO-FINGER DRAG:
  // First finger on dpad = normal directional input (handled by dp buttons)
  // Second finger anywhere on dpad-wrap = drag the whole pad
  // Releasing second finger saves position

  let dragTouchId = null;  // the second touch ID being used for drag

  wrap.addEventListener('touchstart', e=>{
    // If there are now 2+ touches on this element, start drag with the newest
    if(e.touches.length >= 2 && !dragTouchId){
      // Use the most recently added touch
      const t = e.changedTouches[0];
      dragTouchId = t.identifier;
      dpadDragging = true;
      wrap.classList.add('dragging');
      const rect = wrap.getBoundingClientRect();
      dpadDragOffset.x = t.clientX - rect.left;
      dpadDragOffset.y = t.clientY - rect.top;
      if(navigator.vibrate) navigator.vibrate(25);
      e.preventDefault();
    }
  }, {passive:false});

  wrap.addEventListener('touchmove', e=>{
    if(!dpadDragging || dragTouchId===null) return;
    // Find our drag touch
    let t = null;
    for(let i=0;i<e.touches.length;i++){
      if(e.touches[i].identifier===dragTouchId){ t=e.touches[i]; break; }
    }
    if(!t) return;
    moveDpad(t.clientX, t.clientY);
    e.preventDefault();
  }, {passive:false});

  wrap.addEventListener('touchend', e=>{
    // Check if our drag touch ended
    for(let i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===dragTouchId){
        dragTouchId = null;
        dpadDragging = false;
        wrap.classList.remove('dragging');
        // Save position
        try {
          const rect = wrap.getBoundingClientRect();
          const bottom = window.innerHeight - rect.bottom;
          const left = rect.left;
          localStorage.setItem(DPAD_STORAGE_KEY, JSON.stringify({bottom, left}));
        } catch(e2){}
        break;
      }
    }
  }, {passive:true});

  // Double-tap center cell to reset position
  wrap.addEventListener('dblclick', ()=>{
    wrap.style.bottom='32px'; wrap.style.left='16px';
    wrap.style.top='auto'; wrap.style.right='auto';
    try{ localStorage.removeItem(DPAD_STORAGE_KEY); }catch(e){}
  });

  // Mouse drag for desktop testing (left-click drag on center)
  const handle = document.getElementById('dpad-drag-handle');
  if(handle){
    let mouseDown = false;
    handle.addEventListener('mousedown', e=>{
      mouseDown=true; dpadDragging=true;
      wrap.classList.add('dragging');
      const rect=wrap.getBoundingClientRect();
      dpadDragOffset.x=e.clientX-rect.left;
      dpadDragOffset.y=e.clientY-rect.top;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e=>{ if(dpadDragging&&mouseDown) moveDpad(e.clientX,e.clientY); });
    document.addEventListener('mouseup', ()=>{
      if(!mouseDown) return;
      mouseDown=false; dpadDragging=false;
      wrap.classList.remove('dragging');
      try{
        const rect=wrap.getBoundingClientRect();
        localStorage.setItem(DPAD_STORAGE_KEY,JSON.stringify({bottom:window.innerHeight-rect.bottom,left:rect.left}));
      }catch(e){}
    });
  }
}

function moveDpad(clientX, clientY){
  const wrap = document.getElementById('dpad-wrap');
  if(!wrap) return;
  const dpadW = wrap.offsetWidth;
  const dpadH = wrap.offsetHeight;

  let newLeft = clientX - dpadDragOffset.x;
  let newTop  = clientY - dpadDragOffset.y;

  // Clamp to screen
  newLeft = Math.max(4, Math.min(window.innerWidth - dpadW - 4, newLeft));
  newTop  = Math.max(4, Math.min(window.innerHeight - dpadH - 4, newTop));

  wrap.style.left   = newLeft+'px';
  wrap.style.top    = newTop+'px';
  wrap.style.bottom = 'auto';
  wrap.style.right  = 'auto';
}

// ── RESET DPAD POSITION button (double-tap center) ──
let dpadCenterTaps = 0;
function dpadCenterDoubleTap(){
  dpadCenterTaps++;
  if(dpadCenterTaps>=2){
    dpadCenterTaps=0;
    const wrap=document.getElementById('dpad-wrap');
    if(wrap){
      wrap.style.bottom='32px';wrap.style.left='16px';
      wrap.style.top='auto';wrap.style.right='auto';
    }
    try{localStorage.removeItem(DPAD_STORAGE_KEY);}catch(e){}
  }
  setTimeout(()=>dpadCenterTaps=0,400);
}

function mD(d){GS.mk[d]=true;}
function mU(d){GS.mk[d]=false;}
function mA(t){if(t==='atk')atk();else skill();}

// Mobile controls auto-fade
function showMctl(){
  const el=document.getElementById('mctl');
  if(!el) return;
  el.classList.add('show');
  clearTimeout(window._mctlT);
  window._mctlT=setTimeout(()=>el.classList.remove('show'),3500);
}

function hideMctl(){
  const el=document.getElementById('mctl');
  if(!el) return;
  clearTimeout(window._mctlT);
  el.classList.remove('show');
}
document.addEventListener('touchstart',()=>{
  if(document.getElementById('screen-game').classList.contains('active')) showMctl();
},{passive:true});

function togglePause(){
  GS.paused=!GS.paused;
  document.getElementById('pause').classList.toggle('on',GS.paused);
}
function gameOver(){
  GS.running=false;
  setTimeout(()=>{if(confirm('Your hero has fallen.\n\nReturn to title?'))goTitle();},500);
}
function goTitle(){
  GS.running=false;GS.paused=false;
  if(GS.raf)cancelAnimationFrame(GS.raf);
  document.getElementById('hud').classList.remove('on');
  document.getElementById('pause').classList.remove('on');
  showScreen('title');
}
window.addEventListener('resize',()=>{if(document.getElementById('screen-game').classList.contains('active'))resizeCv();});

// ─── BOOT ───
document.addEventListener('DOMContentLoaded',()=>{
  makeStars();
  buildCards();
});
